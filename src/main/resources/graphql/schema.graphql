type Mutation{
createPlayer(player1:playerInput):Players
}

type Query{
allPlayers:[Players]
getPlayers(playerId:Long):Players
}


# === ENUM ===
enum Team {
  CSK
  MI
  RCB
  KKR
}

# === TYPE ===
type Players {
  id: ID!
  name: String
  team: Team
  age: Int
  address: String
  height: Float
  email: String
}
input playerInput{
  name: String
  team: Team
  age: Int
  address: String
  height: Float
  email: String
}


